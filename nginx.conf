server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # ── Gzip compression ──────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/manifest+json
        application/wasm
        image/svg+xml;

    # ── Security headers ──────────────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ── Hashed assets — cache aggressively (1 year) ───────────────────
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ── WebAssembly — correct MIME type ───────────────────────────────
    location ~* \.wasm$ {
        types { application/wasm wasm; }
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # ── ES module workers (.mjs) — correct MIME type ──────────────────
    location ~* \.mjs$ {
        types { application/javascript mjs; }
        try_files $uri =404;
    }

    # ── SPA fallback — all routes resolve to index.html ───────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Disable caching for the shell HTML (always fresh) ─────────────
    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    # ── Service worker — must not be cached by intermediaries ─────────
    location = /sw.js {
        add_header Cache-Control "no-cache";
        try_files $uri =404;
    }
}
